<div class="container">
    <h1>Employee Management System</h1>
    <kendo-textbox (input)="search($event)" placeholder="Search by Employee Name or department"></kendo-textbox>
    <div class="form-container">
        <h2>{{editId?'Update Employee':'Add Employee'}}</h2>
        <form [formGroup]="employeeForm" (ngSubmit)="saveEmployee()">
            <div class="form-group">
                <label>ID:</label>
                <input  formControlName="id" id="idEmp" type="text" placeholder="Enter your ID">
            </div>
            <div class="form-group">
                <label>Name:</label>
                <input formControlName="name" class="grp" type="text" placeholder="Enter your Name">
            </div>
            <div class="form-group">
                <label>Designation:</label>
                <input type="text" formControlName="designation" placeholder="Enter your Designation">
            </div>
            <div class="form-group">
                <label>Department:</label>
                <input type="text" formControlName="department" placeholder="Enter your Department">
            </div>
            <div class="form-group">
                <label>Salary:</label>
                <input class="grp" formControlName="salary" type="text" placeholder="Enter your Salary">
            </div>
            <div class="form-group">
                
                <button type="submit" id="add">{{editId?'Update':'Add'}}</button>
            </div>
        </form>
    </div>

    
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Designation</th>
                <th>Department</th>
                <th>Salary</th>
                <th>...</th>
            </tr>
        </thead>
        <tbody>
            @for(emp of employees();track $index){
                <tr>
                    <td>{{emp.id}}</td>
                    <td>{{emp.name}}</td>
                    <td>{{emp.designation}}</td>
                    <td>{{emp.department}}</td>
                    <td>{{emp.salary}}</td>
                    <td>
                        <button (click)="getEmployeeDetails(emp.id)" id="update">Update</button>
                        <button (click)="deleteEmployee(emp.id)" id="delete">Delete</button>
                    </td>
                </tr>
            }
        </tbody>
    </table>
</div>
